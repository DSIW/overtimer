# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "jsdom"
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright"
          - "playwright-core"
      sentry:
        patterns:
          - "@sentry/*"
      dexie:
        patterns:
          - "dexie"
          - "dexie-react-hooks"
      eslint:
        patterns:
          - "eslint"
          - "eslint-config-prettier"
          - "eslint-plugin-prettier"
    ignore:
      # eslint v10 requires ScopeManager implementations to provide
      # addGlobals(), which @typescript-eslint/scope-manager doesn't
      # implement yet, crashing `npm run lint`. Remove once
      # typescript-eslint ships ESLint 10 support:
      # https://github.com/typescript-eslint/typescript-eslint/issues/11829
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
