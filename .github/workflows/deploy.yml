name: Vercel Deploy

on:
  release:
    types:
      - published
  pull_request:
    branches:
      - main

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.url }}
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: npm ci
      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          set -eo pipefail
          output=$(npx vercel --yes --token "$VERCEL_TOKEN" 2>&1 | tee /dev/stderr)
          url=$(echo "$output" | grep -Eo 'https://[a-zA-Z0-9.-]+\.vercel\.app' | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 Preview deployed to: ${process.env.PREVIEW_URL}`
            })
      - name: Comment deploy failure on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Preview deploy failed. Check the workflow run for details.`
            })

  deploy-production:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: npm ci
      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          set -eo pipefail
          output=$(npx vercel --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tee /dev/stderr)
          url=$(echo "$output" | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
